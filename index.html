<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gregorian → Bangla → Hijri Calendar</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

    <style>
        :root {
            --bg: #f4f7ff;
            --surface: #ffffff;
            --ink: #132237;
            --muted: #5c6b7f;
            --primary: #3b82f6;
            --primary-strong: #1d4ed8;
            --border: #d9e3f3;
            --today: #e8f1ff;
            --weekend: #fff5f5;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 100%);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 14px;
        }

        .app {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(14, 30, 67, 0.08);
            overflow: hidden;
        }

        .topbar {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: #f9fbff;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title h2 {
            margin: 0;
            font-size: 22px;
        }

        .title p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        button, input[type="month"] {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 10px;
            font-size: 14px;
            padding: 10px 12px;
            color: var(--ink);
        }

        button {
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            border-color: var(--primary);
            color: var(--primary-strong);
        }

        .current-label {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px dashed #bfd3f7;
            background: #eef4ff;
            font-weight: 600;
            color: var(--primary-strong);
        }

        .calendar-wrap {
            padding: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: #122644;
            color: white;
            border: 1px solid #20395d;
            padding: 10px 6px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        td {
            border: 1px solid var(--border);
            height: 94px;
            vertical-align: top;
            padding: 8px;
            background: #fff;
        }

        td.weekend {
            background: var(--weekend);
        }

        td.today {
            background: var(--today);
            box-shadow: inset 0 0 0 2px #9fc1ff;
        }

        .eng {
            font-weight: 700;
            font-size: 16px;
        }

        .bn {
            color: #127043;
            margin-top: 3px;
            font-size: 13px;
        }

        .ar {
            color: #a16207;
            margin-top: 2px;
            font-size: 13px;
        }

        .legend {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 13px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            display: inline-block;
            margin-right: 6px;
            vertical-align: -1px;
        }

        @media (max-width: 720px) {
            th { font-size: 12px; }
            td { height: 84px; padding: 6px; }
            .eng { font-size: 14px; }
            .bn, .ar { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title">
                <h2>Gregorian → Bangla → Hijri</h2>
                <p>Select any month to view all three calendar systems together.</p>
            </div>

            <div class="controls">
                <button id="prevMonth">◀ Prev</button>
                <input type="month" id="monthPicker" />
                <button id="nextMonth">Next ▶</button>
                <div id="currentLabel" class="current-label"></div>
            </div>
        </div>

        <div class="calendar-wrap">
            <table id="calendarTable">
                <thead>
                    <tr>
                        <th>Sun</th><th>Mon</th><th>Tue</th>
                        <th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="legend">
            <span><span class="dot" style="background:#3b82f6"></span>Gregorian date</span>
            <span><span class="dot" style="background:#127043"></span>Bangla date</span>
            <span><span class="dot" style="background:#a16207"></span>Hijri date</span>
            <span><span class="dot" style="background:#e8f1ff; border:1px solid #9fc1ff"></span>Today</span>
        </div>
    </div>

<script>
const banglaMonths = [
    "Boishakh","Joishtho","Ashar","Srabon","Bhadro","Ashwin",
    "Kartik","Agrahayan","Poush","Magh","Falgun","Chaitra"
];

const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
];

let selectedDate = new Date();

function getBanglaDate(date) {
    const year = date.getFullYear();
    const pohelaBoishakh = new Date(year, 3, 14);

    let diff = Math.floor((date - pohelaBoishakh) / 86400000);
    if (diff < 0) {
        const prevPohela = new Date(year - 1, 3, 14);
        diff = Math.floor((date - prevPohela) / 86400000);
    }

    let month = Math.floor(diff / 30) % 12;
    let day = (diff % 30) + 1;

    return { day, month: banglaMonths[month] };
}

function updateMonthInput(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    $("#monthPicker").val(`${y}-${m}`);
    $("#currentLabel").text(`${monthNames[date.getMonth()]} ${y}`);
}

function generateCalendar(year, month) {
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    const tbody = $("#calendarTable tbody");
    tbody.empty();

    let html = "<tr>";

    for (let i = 0; i < firstDay; i++) html += "<td></td>";

    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        const bn = getBanglaDate(date);
        const hijri = (typeof HijriDate === "function") ? new HijriDate(date) : null;

        const isToday =
            d === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear();

        const isWeekend = date.getDay() === 5 || date.getDay() === 6;
        const classes = `${isToday ? "today" : ""} ${isWeekend ? "weekend" : ""}`.trim();

        html += `
            <td class="${classes}">
                <div class="eng">${d}</div>
                <div class="bn">${bn.day} ${bn.month}</div>
                <div class="ar">${hijri ? `${hijri.getDate()} ${hijri.getMonthName()}` : "Hijri unavailable"}</div>
            </td>
        `;

        if ((firstDay + d) % 7 === 0 && d !== daysInMonth) html += "</tr><tr>";
    }

    const totalCells = firstDay + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for (let i = 0; i < trailing; i++) html += "<td></td>";

    html += "</tr>";
    tbody.append(html);
}

function render() {
    updateMonthInput(selectedDate);
    generateCalendar(selectedDate.getFullYear(), selectedDate.getMonth());
}

$("#monthPicker").on("change", function () {
    const [year, month] = $(this).val().split("-").map(Number);
    selectedDate = new Date(year, month - 1, 1);
    render();
});

$("#prevMonth").on("click", function () {
    selectedDate.setMonth(selectedDate.getMonth() - 1);
    render();
});

$("#nextMonth").on("click", function () {
    selectedDate.setMonth(selectedDate.getMonth() + 1);
    render();
});

render();
</script>
</body>
</html>
