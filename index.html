<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bangla, Hijri & Gregorian Calendar | Monthly Date Converter</title>
    <meta name="description" content="View Gregorian, Bangla (Bengali), and Hijri dates side by side in one monthly calendar. Navigate any month and compare all three date systems instantly." />
    <meta name="keywords" content="Bangla calendar, Bengali calendar, Hijri calendar, Gregorian calendar, date converter, monthly calendar" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://example.com/bangla-hijri-gregorian-calendar" />
    <meta property="og:title" content="Bangla, Hijri & Gregorian Calendar" />
    <meta property="og:description" content="A clean monthly calendar showing Gregorian, Bangla, and Hijri dates together." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/bangla-hijri-gregorian-calendar" />
    <meta name="theme-color" content="#122644" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --ink: #0f1f35;
            --muted: #5b6676;
            --primary: #2563eb;
            --primary-strong: #1e40af;
            --border: #d2dceb;
            --today: #e8f0ff;
            --weekend: #fff7ef;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            background: linear-gradient(180deg, #eef3ff 0%, #f5f7fb 100%);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 14px;
        }

        .app {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(14, 30, 67, 0.08);
            overflow: hidden;
        }

        .topbar {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: #f9fbff;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title h2 {
            margin: 0;
            font-size: 22px;
        }

        .title p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        button, input[type="month"] {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 10px;
            font-size: 14px;
            padding: 10px 12px;
            color: var(--ink);
        }

        button {
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            border-color: var(--primary);
            color: var(--primary-strong);
        }

        .current-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .month-hero {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #c6d8fb;
            background: linear-gradient(120deg, #eff5ff 0%, #f8fbff 60%, #eef7ff 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .month-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .month-year {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.4px;
            color: #163562;
        }

        .month-season {
            font-size: 13px;
            color: #31598f;
            font-weight: 600;
        }

        .month-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .badge-gregorian { background: #e8f1ff; color: #1d4ed8; border-color: #b8d2ff; }
        .badge-bangla { background: #e8fff1; color: #0f6b3f; border-color: #bfead0; }
        .badge-hijri { background: #fff8e9; color: #9a5b0e; border-color: #f7dfaa; }

        .current-label {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px dashed #bfd3f7;
            background: #eef4ff;
            font-weight: 600;
            color: var(--primary-strong);
        }

        .current-sub-label {
            font-size: 13px;
            color: var(--muted);
            padding-left: 4px;
            line-height: 1.3;
        }

        .visitor-weather {
            margin-top: 10px;
            border: 1px solid #cfe0fb;
            background: #f3f8ff;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            color: #18375f;
        }

        .visitor-weather strong {
            color: #0f2f56;
        }

        .calendar-wrap {
            padding: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        #calendarTable {
            min-width: 700px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: #122644;
            color: white;
            border: 1px solid #20395d;
            padding: 10px 6px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        td {
            border: 1px solid var(--border);
            height: 94px;
            vertical-align: top;
            padding: 8px;
            background: #fff;
        }

        td.weekend {
            background: var(--weekend);
        }

        td.today {
            background: var(--today);
            box-shadow: inset 0 0 0 2px #9fc1ff;
        }

        .eng {
            font-weight: 700;
            font-size: 16px;
        }

        .bn {
            color: #127043;
            margin-top: 3px;
            font-size: 13px;
        }

        .ar {
            color: #a16207;
            margin-top: 2px;
            font-size: 13px;
        }

        .holiday {
            margin-top: 4px;
            font-size: 11px;
            font-weight: 700;
            color: #b42318;
            background: #fff1f1;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 2px 5px;
            line-height: 1.2;
        }

        .legend {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 13px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            display: inline-block;
            margin-right: 6px;
            vertical-align: -1px;
        }

        @media (max-width: 900px) {
            body { padding: 16px 10px; }
            .month-year { font-size: 24px; }
        }

        @media (max-width: 720px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                width: 100%;
                justify-content: space-between;
            }

            .controls button,
            .controls input[type="month"] {
                flex: 1 1 30%;
                min-width: 0;
                text-align: center;
                padding: 10px 8px;
            }

            th { font-size: 12px; }
            td { height: 84px; padding: 6px; }
            .eng { font-size: 14px; }
            .bn, .ar { font-size: 12px; }
            .month-year { font-size: 22px; }
        }

        @media (max-width: 480px) {
            body { padding: 10px 6px; }
            .app { border-radius: 12px; }
            .topbar, .month-hero, .legend { padding: 10px; }
            .title h2 { font-size: 18px; }
            .title p { font-size: 12px; }
            .month-year { font-size: 20px; }
            .badge { font-size: 11px; padding: 6px 9px; }
            td { height: 74px; padding: 5px; }
            .eng { font-size: 13px; }
            .bn, .ar { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title">
                <h2>Bangla, Hijri & Gregorian Calendar</h2>
                <p>Plan months with synchronized Gregorian, Bangla, and Hijri dates in one view.</p>
            </div>

            <div class="controls">
                <button id="prevMonth">◀ Prev</button>
                <input type="month" id="monthPicker" />
                <button id="nextMonth">Next ▶</button>
            </div>
        </div>

        <div class="controls">
            <div class="current-info">
                <div class="month-hero">
                    <div class="month-title-wrap">
                        <div id="currentLabel" class="month-year"></div>
                        <div id="currentSeason" class="month-season"></div>
                    </div>
                    <div class="month-badges">
                        <span id="banglaBadge" class="badge badge-bangla"></span>
                        <span id="hijriBadge" class="badge badge-hijri"></span>
                    </div>
                </div>
                <div id="visitorWeather" class="visitor-weather">
                    📍 Detecting your location and loading local weather...
                </div>
            </div>
        </div>

        <div class="calendar-wrap">
            <table id="calendarTable">
                <thead>
                    <tr>
                        <th>Sun</th><th>Mon</th><th>Tue</th>
                        <th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="legend">
            <span><span class="dot" style="background:#3b82f6"></span>Gregorian date</span>
            <span><span class="dot" style="background:#127043"></span>Bangla date</span>
            <span><span class="dot" style="background:#a16207"></span>Hijri date</span>
            <span><span class="dot" style="background:#e8f1ff; border:1px solid #9fc1ff"></span>Today</span>
            <span><span class="dot" style="background:#fff1f1; border:1px solid #fecaca"></span>Public holiday</span>
        </div>
    </div>

<script>
const banglaMonths = [
    "বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন",
    "কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"
];

const hijriMonthMap = {
    "Muharram": "মুহাররম",
    "Safar": "সফর",
    "Rabiʻ I": "রবিউল আউয়াল",
    "Rabiʻ II": "রবিউস সানি",
    "Jumada I": "জমাদিউল আউয়াল",
    "Jumada II": "জমাদিউস সানি",
    "Rajab": "রজব",
    "Shaʻban": "শাবান",
    "Ramadan": "রমজান",
    "Shawwal": "শাওয়াল",
    "Dhuʻl-Qiʻdah": "জিলক্বদ",
    "Dhuʻl-Hijjah": "জিলহজ্জ"
};

function toBanglaNumber(value) {
    return String(value).replace(/[0-9]/g, d => "০১২৩৪৫৬৭৮৯"[Number(d)]);
}

const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
];

const seasonMap = {
    11: "❄️ Winter (পৌষ - মাঘ)", 0: "❄️ Winter (পৌষ - মাঘ)", 1: "🌸 Spring (ফাল্গুন - চৈত্র)",
    2: "🌸 Spring (ফাল্গুন - চৈত্র)", 3: "☀️ Summer (বৈশাখ - জ্যৈষ্ঠ)", 4: "☀️ Summer (বৈশাখ - জ্যৈষ্ঠ)",
    5: "🌧️ Monsoon (আষাঢ় - শ্রাবণ)", 6: "🌧️ Monsoon (আষাঢ় - শ্রাবণ)", 7: "🍃 Late Autumn (ভাদ্র - আশ্বিন)",
    8: "🍃 Late Autumn (ভাদ্র - আশ্বিন)", 9: "🍂 Autumn (কার্তিক - অগ্রহায়ণ)", 10: "🍂 Autumn (কার্তিক - অগ্রহায়ণ)"
};

let selectedDate = new Date();

const LOCAL_HOLIDAYS_URL = new URL("holidays.json", document.baseURI).href;
let localHolidayCache = null;
const IPINFO_URL = "https://ipinfo.io/json";
const WEATHER_BASE_URL = "https://api.open-meteo.com/v1/forecast";

function formatDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

function escapeHtml(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

async function getLocalHolidays(year) {
    if (!localHolidayCache) {
        try {
            const res = await fetch(LOCAL_HOLIDAYS_URL, { cache: "no-store" });
            if (!res.ok) throw new Error(`Local holidays status ${res.status}`);
            const data = await res.json();
            localHolidayCache = data?.holidays || [];
        } catch (error) {
            console.warn("Could not load local holidays:", error);
            localHolidayCache = [];
        }
    }

    const dateMap = new Map();
    for (const item of localHolidayCache) {
        const isoDate = item?.date?.iso?.slice(0, 10);
        const itemYear = item?.date?.datetime?.year || Number(isoDate?.slice(0, 4));
        if (!isoDate || itemYear !== year) continue;

        const displayName = item.name_bn || item.name || "Public Holiday";
        const existing = dateMap.get(isoDate);
        if (existing) {
            dateMap.set(isoDate, `${existing}, ${displayName}`);
        } else {
            dateMap.set(isoDate, displayName);
        }
    }

    return dateMap;
}

function getBanglaDate(date) {
    const year = date.getFullYear();
    const pohelaBoishakh = new Date(year, 3, 14);
    const banglaYear = date >= pohelaBoishakh ? year - 593 : year - 594;

    let diff = Math.floor((date - pohelaBoishakh) / 86400000);
    if (diff < 0) {
        const prevPohela = new Date(year - 1, 3, 14);
        diff = Math.floor((date - prevPohela) / 86400000);
    }

    let month = Math.floor(diff / 30) % 12;
    let day = (diff % 30) + 1;

    return { day, month: banglaMonths[month], year: banglaYear };
}


function getHijriDateData(date) {
    if (typeof Intl === "object" && typeof Intl.DateTimeFormat === "function") {
        try {
            const parts = new Intl.DateTimeFormat("en-TN-u-ca-islamic", {
                day: "numeric",
                month: "long",
                year: "numeric"
            }).formatToParts(date);
            const day = parts.find(p => p.type === "day")?.value;
            const month = parts.find(p => p.type === "month")?.value;
            const year = parts.find(p => p.type === "year")?.value;
            if (day && month && year) {
                const mappedMonth = hijriMonthMap[month] || month;
                return {
                    day: Number(day),
                    month: mappedMonth,
                    year: Number(year)
                };
            }
        } catch (e) {
            // Fallback to HijriDate library below
        }
    }

    if (typeof HijriDate === "function") {
        try {
            const hijri = new HijriDate(date);
            const monthName = hijri.getMonthName();
            const mappedMonth = hijriMonthMap[monthName] || monthName;
            return {
                day: hijri.getDate(),
                month: mappedMonth,
                year: hijri.getFullYear()
            };
        } catch (e) {
            return null;
        }
    }

    return null;
}

function getHijriDateLabel(date) {
    const hijri = getHijriDateData(date);
    if (!hijri) return "Hijri unavailable";
    return `${toBanglaNumber(hijri.day)} ${hijri.month}`;
}

function getSubtitleData(date) {
    const year = date.getFullYear();
    const month = date.getMonth();
    const firstDate = new Date(year, month, 1);
    const lastDate = new Date(year, month + 1, 0);

    const firstBangla = getBanglaDate(firstDate);
    const lastBangla = getBanglaDate(lastDate);
    const firstHijri = getHijriDateData(firstDate);
    const lastHijri = getHijriDateData(lastDate);

    const banglaLine = `(${firstBangla.month} - ${lastBangla.month}, ${toBanglaNumber(firstBangla.year)} বঙ্গাব্দ)`;
    const hijriLine = firstHijri && lastHijri
        ? `(${firstHijri.month} - ${lastHijri.month}, ${toBanglaNumber(firstHijri.year)} হিজরি)`
        : "(Hijri unavailable)";

    return { bangla: banglaLine, hijri: hijriLine };
}

function updateMonthInput(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const subtitleData = getSubtitleData(date);
    const monthName = monthNames[date.getMonth()];
    $("#monthPicker").val(`${y}-${m}`);
    $("#currentLabel").text(`${monthName} ${y}`);
    $("#currentSeason").text(`${seasonMap[date.getMonth()]}`);
    $("#banglaBadge").text(subtitleData.bangla.replace(/[()]/g, ""));
    $("#hijriBadge").text(subtitleData.hijri.replace(/[()]/g, ""));
}

function weatherCodeToText(code) {
    const map = {
        0: "Clear sky",
        1: "Mainly clear",
        2: "Partly cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Depositing rime fog",
        51: "Light drizzle",
        53: "Moderate drizzle",
        55: "Dense drizzle",
        56: "Freezing drizzle",
        57: "Dense freezing drizzle",
        61: "Slight rain",
        63: "Moderate rain",
        65: "Heavy rain",
        66: "Freezing rain",
        67: "Heavy freezing rain",
        71: "Slight snow",
        73: "Moderate snow",
        75: "Heavy snow",
        77: "Snow grains",
        80: "Rain showers",
        81: "Moderate rain showers",
        82: "Violent rain showers",
        85: "Slight snow showers",
        86: "Heavy snow showers",
        95: "Thunderstorm",
        96: "Thunderstorm with hail",
        99: "Heavy thunderstorm with hail"
    };
    return map[code] || `Weather code ${code}`;
}

async function loadVisitorWeather() {
    const widget = $("#visitorWeather");
    try {
        const ipRes = await fetch(IPINFO_URL);
        if (!ipRes.ok) throw new Error(`ipinfo status ${ipRes.status}`);
        const ipData = await ipRes.json();
        const [latitude, longitude] = String(ipData.loc || "").split(",");
        if (!latitude || !longitude) throw new Error("Coordinates unavailable");

        const weatherUrl = `${WEATHER_BASE_URL}?latitude=${encodeURIComponent(latitude)}&longitude=${encodeURIComponent(longitude)}&current_weather=true`;
        const weatherRes = await fetch(weatherUrl);
        if (!weatherRes.ok) throw new Error(`Open-Meteo status ${weatherRes.status}`);
        const weatherData = await weatherRes.json();
        const current = weatherData.current_weather;
        if (!current) throw new Error("Current weather unavailable");

        const city = [ipData.city, ipData.region, ipData.country].filter(Boolean).join(", ");
        const weatherText = weatherCodeToText(current.weathercode);
        widget.html(`📍 <strong>${escapeHtml(city || "Your area")}</strong> · 🌡️ ${escapeHtml(current.temperature)}°C · 💨 ${escapeHtml(current.windspeed)} km/h · ☁️ ${escapeHtml(weatherText)} <span style="color:#496991;">(${escapeHtml(current.time)})</span>`);
    } catch (error) {
        console.warn("Could not load visitor weather:", error);
        widget.text("⚠️ Couldn't load your location/weather right now. Please check internet connection or API availability.");
    }
}

function generateCalendar(year, month, holidays = new Map()) {
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    const tbody = $("#calendarTable tbody");
    tbody.empty();

    let html = "<tr>";

    for (let i = 0; i < firstDay; i++) html += "<td></td>";

    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        const bn = getBanglaDate(date);

        const isToday =
            d === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear();

        const isWeekend = date.getDay() === 5 || date.getDay() === 6;
        const classes = `${isToday ? "today" : ""} ${isWeekend ? "weekend" : ""}`.trim();

        const holidayName = holidays.get(formatDateKey(date));

        html += `
            <td class="${classes}">
                <div class="eng">${d}</div>
                <div class="bn">${toBanglaNumber(bn.day)} ${bn.month}</div>
                <div class="ar">${getHijriDateLabel(date)}</div>
                ${holidayName ? `<div class="holiday" title="${escapeHtml(holidayName)}">${escapeHtml(holidayName)}</div>` : ""}
            </td>
        `;

        if ((firstDay + d) % 7 === 0 && d !== daysInMonth) html += "</tr><tr>";
    }

    const totalCells = firstDay + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for (let i = 0; i < trailing; i++) html += "<td></td>";

    html += "</tr>";
    tbody.append(html);
}

async function render() {
    updateMonthInput(selectedDate);
    const year = selectedDate.getFullYear();
    const holidays = await getLocalHolidays(year);
    generateCalendar(year, selectedDate.getMonth(), holidays);
}

$("#monthPicker").on("change", function () {
    const [year, month] = $(this).val().split("-").map(Number);
    selectedDate = new Date(year, month - 1, 1);
    render();
});

$("#prevMonth").on("click", function () {
    selectedDate.setMonth(selectedDate.getMonth() - 1);
    render();
});

$("#nextMonth").on("click", function () {
    selectedDate.setMonth(selectedDate.getMonth() + 1);
    render();
});

render();
loadVisitorWeather();

if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch((error) => {
            console.warn("Service worker registration failed:", error);
        });
    });
}

</script>
</body>
</html>
