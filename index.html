<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gregorian → Bangla → Hijri Calendar</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.js"></script>

    <style>
        :root {
            --bg: #f4f7ff;
            --surface: #ffffff;
            --ink: #132237;
            --muted: #5c6b7f;
            --primary: #3b82f6;
            --primary-strong: #1d4ed8;
            --border: #d9e3f3;
            --today: #e8f1ff;
            --weekend: #fff5f5;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 100%);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 14px;
        }

        .app {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(14, 30, 67, 0.08);
            overflow: hidden;
        }

        .topbar {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: #f9fbff;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title h2 {
            margin: 0;
            font-size: 22px;
        }

        .title p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        button, input[type="month"] {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 10px;
            font-size: 14px;
            padding: 10px 12px;
            color: var(--ink);
        }

        button {
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            border-color: var(--primary);
            color: var(--primary-strong);
        }

        .current-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .month-hero {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #c6d8fb;
            background: linear-gradient(120deg, #eff5ff 0%, #f8fbff 60%, #eef7ff 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .month-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .month-year {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.4px;
            color: #163562;
        }

        .month-season {
            font-size: 13px;
            color: #31598f;
            font-weight: 600;
        }

        .month-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .badge-gregorian { background: #e8f1ff; color: #1d4ed8; border-color: #b8d2ff; }
        .badge-bangla { background: #e8fff1; color: #0f6b3f; border-color: #bfead0; }
        .badge-hijri { background: #fff8e9; color: #9a5b0e; border-color: #f7dfaa; }

        .current-label {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px dashed #bfd3f7;
            background: #eef4ff;
            font-weight: 600;
            color: var(--primary-strong);
        }

        .current-sub-label {
            font-size: 13px;
            color: var(--muted);
            padding-left: 4px;
            line-height: 1.3;
        }

        .calendar-wrap {
            padding: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: #122644;
            color: white;
            border: 1px solid #20395d;
            padding: 10px 6px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        td {
            border: 1px solid var(--border);
            height: 94px;
            vertical-align: top;
            padding: 8px;
            background: #fff;
        }

        td.weekend {
            background: var(--weekend);
        }

        td.today {
            background: var(--today);
            box-shadow: inset 0 0 0 2px #9fc1ff;
        }

        .eng {
            font-weight: 700;
            font-size: 16px;
        }

        .bn {
            color: #127043;
            margin-top: 3px;
            font-size: 13px;
        }

        .ar {
            color: #a16207;
            margin-top: 2px;
            font-size: 13px;
        }

        .legend {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 13px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            display: inline-block;
            margin-right: 6px;
            vertical-align: -1px;
        }

        @media (max-width: 720px) {
            th { font-size: 12px; }
            td { height: 84px; padding: 6px; }
            .eng { font-size: 14px; }
            .bn, .ar { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title">
                <h2>Gregorian → Bangla → Hijri</h2>
                <p>Select any month to view all three calendar systems together.</p>
            </div>

            <div class="controls">
                <button id="prevMonth">◀ Prev</button>
                <input type="month" id="monthPicker" />
                <button id="nextMonth">Next ▶</button>
            </div>
        </div>

        <div class="controls">
            <div class="current-info">
                <div class="month-hero">
                    <div class="month-title-wrap">
                        <div id="currentLabel" class="month-year"></div>
                    </div>
                    <div class="month-badges">
                        <span id="banglaBadge" class="badge badge-bangla"></span>
                        <span id="hijriBadge" class="badge badge-hijri"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="calendar-wrap">
            <table id="calendarTable">
                <thead>
                    <tr>
                        <th>Sun</th><th>Mon</th><th>Tue</th>
                        <th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="legend">
            <span><span class="dot" style="background:#3b82f6"></span>Gregorian date</span>
            <span><span class="dot" style="background:#127043"></span>Bangla date</span>
            <span><span class="dot" style="background:#a16207"></span>Hijri date</span>
            <span><span class="dot" style="background:#e8f1ff; border:1px solid #9fc1ff"></span>Today</span>
        </div>
    </div>

<script>
const banglaMonths = [
    "বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন",
    "কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"
];

const hijriMonthMap = {
    "Muharram": "মুহাররম",
    "Safar": "সফর",
    "Rabiʻ I": "রবিউল আউয়াল",
    "Rabiʻ II": "রবিউস সানি",
    "Jumada I": "জমাদিউল আউয়াল",
    "Jumada II": "জমাদিউস সানি",
    "Rajab": "রজব",
    "Shaʻban": "শাবান",
    "Ramadan": "রমজান",
    "Shawwal": "শাওয়াল",
    "Dhuʻl-Qiʻdah": "জিলক্বদ",
    "Dhuʻl-Hijjah": "জিলহজ্জ"
};

function toBanglaNumber(value) {
    return String(value).replace(/[0-9]/g, d => "০১২৩৪৫৬৭৮৯"[Number(d)]);
}

const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
];

const seasonMap = {
    11: "❄ Winter", 0: "❄ Winter", 1: "❄ Winter",
    2: "🌸 Spring", 3: "🌸 Spring", 4: "🌸 Spring",
    5: "☀ Summer", 6: "☀ Summer", 7: "☀ Summer",
    8: "🍂 Autumn", 9: "🍂 Autumn", 10: "🍂 Autumn"
};

let selectedDate = new Date();

function getBanglaDate(date) {
    const year = date.getFullYear();
    const pohelaBoishakh = new Date(year, 3, 14);
    const banglaYear = date >= pohelaBoishakh ? year - 593 : year - 594;

    let diff = Math.floor((date - pohelaBoishakh) / 86400000);
    if (diff < 0) {
        const prevPohela = new Date(year - 1, 3, 14);
        diff = Math.floor((date - prevPohela) / 86400000);
    }

    let month = Math.floor(diff / 30) % 12;
    let day = (diff % 30) + 1;

    return { day, month: banglaMonths[month], year: banglaYear };
}


function getHijriDateData(date) {
    if (typeof Intl === "object" && typeof Intl.DateTimeFormat === "function") {
        try {
            const parts = new Intl.DateTimeFormat("en-TN-u-ca-islamic", {
                day: "numeric",
                month: "long",
                year: "numeric"
            }).formatToParts(date);
            const day = parts.find(p => p.type === "day")?.value;
            const month = parts.find(p => p.type === "month")?.value;
            const year = parts.find(p => p.type === "year")?.value;
            if (day && month && year) {
                const mappedMonth = hijriMonthMap[month] || month;
                return {
                    day: Number(day),
                    month: mappedMonth,
                    year: Number(year)
                };
            }
        } catch (e) {
            // Fallback to HijriDate library below
        }
    }

    if (typeof HijriDate === "function") {
        try {
            const hijri = new HijriDate(date);
            const monthName = hijri.getMonthName();
            const mappedMonth = hijriMonthMap[monthName] || monthName;
            return {
                day: hijri.getDate(),
                month: mappedMonth,
                year: hijri.getFullYear()
            };
        } catch (e) {
            return null;
        }
    }

    return null;
}

function getHijriDateLabel(date) {
    const hijri = getHijriDateData(date);
    if (!hijri) return "Hijri unavailable";
    return `${toBanglaNumber(hijri.day)} ${hijri.month}`;
}

function getSubtitleData(date) {
    const year = date.getFullYear();
    const month = date.getMonth();
    const firstDate = new Date(year, month, 1);
    const lastDate = new Date(year, month + 1, 0);

    const firstBangla = getBanglaDate(firstDate);
    const lastBangla = getBanglaDate(lastDate);
    const firstHijri = getHijriDateData(firstDate);
    const lastHijri = getHijriDateData(lastDate);

    const banglaLine = `(${firstBangla.month} - ${lastBangla.month}, ${toBanglaNumber(firstBangla.year)} বঙ্গাব্দ)`;
    const hijriLine = firstHijri && lastHijri
        ? `(${firstHijri.month} - ${lastHijri.month}, ${toBanglaNumber(firstHijri.year)} হিজরি)`
        : "(Hijri unavailable)";

    return { bangla: banglaLine, hijri: hijriLine };
}

function updateMonthInput(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const subtitleData = getSubtitleData(date);
    const monthName = monthNames[date.getMonth()];
    $("#monthPicker").val(`${y}-${m}`);
    $("#currentLabel").text(`${monthName} ${y}`);
    $("#gregorianBadge").text(`${monthName} ${y}`);
    $("#banglaBadge").text(subtitleData.bangla.replace(/[()]/g, ""));
    $("#hijriBadge").text(subtitleData.hijri.replace(/[()]/g, ""));
    $("#currentSubLabel").html(`${subtitleData.bangla}<br>${subtitleData.hijri}`);
}

function generateCalendar(year, month) {
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    const tbody = $("#calendarTable tbody");
    tbody.empty();

    let html = "<tr>";

    for (let i = 0; i < firstDay; i++) html += "<td></td>";

    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        const bn = getBanglaDate(date);

        const isToday =
            d === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear();

        const isWeekend = date.getDay() === 5 || date.getDay() === 6;
        const classes = `${isToday ? "today" : ""} ${isWeekend ? "weekend" : ""}`.trim();

        html += `
            <td class="${classes}">
                <div class="eng">${d}</div>
                <div class="bn">${toBanglaNumber(bn.day)} ${bn.month}</div>
                <div class="ar">${getHijriDateLabel(date)}</div>
            </td>
        `;

        if ((firstDay + d) % 7 === 0 && d !== daysInMonth) html += "</tr><tr>";
    }

    const totalCells = firstDay + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for (let i = 0; i < trailing; i++) html += "<td></td>";

    html += "</tr>";
    tbody.append(html);
}

function render() {
    updateMonthInput(selectedDate);
    generateCalendar(selectedDate.getFullYear(), selectedDate.getMonth());
}

$("#monthPicker").on("change", function () {
    const [year, month] = $(this).val().split("-").map(Number);
    selectedDate = new Date(year, month - 1, 1);
    render();
});

$("#prevMonth").on("click", function () {
    selectedDate.setMonth(selectedDate.getMonth() - 1);
    render();
});

$("#nextMonth").on("click", function () {
    selectedDate.setMonth(selectedDate.getMonth() + 1);
    render();
});

render();
</script>
</body>
</html>
